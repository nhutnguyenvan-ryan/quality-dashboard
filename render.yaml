services:
  - type: web
    name: shiftiq
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: shiftiq-db
          property: connectionString

databases:
  - name: shiftiq-db
    plan: free
